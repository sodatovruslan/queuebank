{% extends 'base.html' %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueBank</title>
</head>
<body>

    <nav>
        <a href="{% url 'home' %}">QueueBank</a>
        {% if user.is_authenticated %}
            <a href="{% url 'ai_help' %}">AI Assistant</a>
            {% if perms.tickets.change_ticket %}
                <a href="{% url 'operator_panel' %}">Operator Panel</a>
            {% else %}
                <a href="{% url 'my_ticket' %}">My Ticket</a>
            {% endif %}
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'register' %}">Register</a>
        {% endif %}
    </nav>

    <div>
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
