{% extends 'base.html' %}

{% block content %}
<div class="container">
    {% if ticket %}
    <div class="ticket">
        <h2>Your Ticket</h2>
        <div class="ticket-number">{{ ticket.number }}</div>
        <p>Service: {{ ticket.service.name }}</p>
        <p class="status-{{ ticket.status }}">Status: {{ ticket.get_status_display }}</p>
        <p>People ahead: {{ position }}</p>
        <meta http-equiv="refresh" content="10">
    </div>
    {% else %}
    <div class="card">
        <h2>No active ticket!</h2>
        <br>
        <a href="{% url 'home' %}" class="btn">Take a ticket</a>
    </div>
    {% endif %}
</div>
{% endblock %}
