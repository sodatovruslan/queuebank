{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div class="card" style="max-width:400px;margin:0 auto;">
        <h2>Login</h2>
        <br>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            {{form}}
            <button type="submit" class="btn">Login</button>
        </form>
        <br>
        <a href="{% url 'register' %}">Don't have account? Register</a>
        <br>
        <a href="{% url 'forgot_password' %}">Forgot password?</a>
    </div>
</div>
{% endblock %}
