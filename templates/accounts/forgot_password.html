{% extends 'base.html' %}

{% block content %}

<h2>Forgot Password</h2>

{% if error %}
    <p>{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Enter your email">
    <button type="submit">Send Code</button>
</form>

<a href="{% url 'login' %}">Back to Login</a>

{% endblock %}
