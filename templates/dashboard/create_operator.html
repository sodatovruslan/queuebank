{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card" style="max-width:400px;margin:0 auto;">
        <h2>➕ Create Operator</h2>
        <br>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Create Operator</button>
        </form>
        <br>
        <a href="{% url 'dashboard' %}">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
